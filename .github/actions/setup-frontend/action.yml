name: Setup Node frontend
description: Set up Node 20, install frontend dependencies with npm cache

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: frontend
      run: npm ci
