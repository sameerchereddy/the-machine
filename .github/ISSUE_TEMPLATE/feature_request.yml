name: Feature Request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user problem or gap this addresses.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should The Machine do differently?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - LLM provider support
        - Agent builder UI
        - Tool system
        - Knowledge base
        - Traces / observability
        - Auth / security
        - API
        - DevOps / infra
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues before opening this one
          required: true
